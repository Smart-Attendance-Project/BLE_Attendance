services:
  - type: web
    name: ble-attendance-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt && python scripts/seed_full.py
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT --app-dir .
    envVars:
      - key: PYTHONPATH
        value: .
      - key: DATABASE_URL_OVERRIDE
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: false
    healthCheckPath: /health
    autoDeploy: true
